<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essex or Barry? — The Gavin &amp; Stacey Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --essex: #C9960C;
    --essex-dark: #7A5800;
    --essex-light: #FFF8DC;
    --essex-pink: #D94F6A;
    --barry: #1A4F72;
    --barry-light: #D6EAF8;
    --barry-mid: #2980B9;
    --bg: #FAF5E8;
    --card-bg: #FFFEF9;
    --text: #22150A;
    --border: #E2C97E;
    --muted: #9A8A70;
    --shadow: rgba(0,0,0,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    background-image:
      radial-gradient(ellipse at 10% 60%, rgba(201,150,12,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 40%, rgba(26,79,114,0.12) 0%, transparent 55%);
  }

  /* ─── HEADER ─────────────────── */
  header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 16px;
  }

  .header-flags {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 6px;
  }

  .flag { font-size: 2.2rem; }

  h1 {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    color: var(--text);
    letter-spacing: 3px;
    line-height: 1;
  }

  h1 .or {
    font-size: 0.55em;
    color: var(--muted);
    letter-spacing: 2px;
    vertical-align: middle;
  }

  .subtitle {
    font-style: italic;
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 6px;
  }

  .divider {
    width: 72px;
    height: 3px;
    background: linear-gradient(to right, var(--essex-pink), var(--barry));
    border-radius: 2px;
    margin: 14px auto 0;
  }

  /* ─── GAME AREA ───────────────── */
  #game-area {
    width: 100%;
    max-width: 580px;
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
  }

  .score-badge {
    background: var(--text);
    color: #fff;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.78rem;
  }

  /* Progress bar */
  .progress-track {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 22px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--essex-pink), var(--barry));
    border-radius: 3px;
    transition: width 0.45s cubic-bezier(.4,0,.2,1);
  }

  /* ─── CARD ────────────────────── */
  .card-wrap {
    margin-bottom: 6px;
  }

  .card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 40px 32px 36px;
    box-shadow: 0 6px 28px var(--shadow);
    min-height: 190px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: border-color 0.25s, background 0.25s;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 18px 18px 0 0;
    background: linear-gradient(to right, var(--essex-pink) 0%, var(--barry) 100%);
  }

  .card.correct { border-color: #27AE60; background: #F2FFF6; }
  .card.wrong   { border-color: #E74C3C; background: #FFF5F5; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-9px); }
    40%     { transform: translateX(9px); }
    60%     { transform: translateX(-6px); }
    80%     { transform: translateX(4px); }
  }
  .card.shake { animation: shake 0.38s ease; }

  .q-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    font-weight: 700;
    color: #C0A870;
    margin-bottom: 16px;
  }

  .q-body {
    font-size: clamp(1.1rem, 2.8vw, 1.45rem);
    color: var(--text);
    line-height: 1.65;
  }

  .q-body.is-quote {
    font-family: 'Lato', sans-serif;
    font-style: italic;
    font-size: clamp(1.15rem, 3vw, 1.55rem);
  }
  .q-body.is-quote::before { content: '\201C'; }
  .q-body.is-quote::after  { content: '\201D'; }

  .q-hint {
    margin-top: 14px;
    font-size: 0.78rem;
    color: #C0B090;
    font-style: italic;
  }

  /* ─── FEEDBACK ────────────────── */
  .feedback-bar {
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin: 10px 0 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .feedback-bar.show { opacity: 1; }
  .feedback-bar.correct { color: #1E8449; }
  .feedback-bar.wrong   { color: #C0392B; }

  /* ─── ANSWER BUTTONS ──────────── */
  .answer-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .btn-answer {
    padding: 22px 10px 18px;
    border: 2.5px solid transparent;
    border-radius: 14px;
    font-family: 'Abril Fatface', serif;
    font-size: 1.5rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .btn-answer:active:not(:disabled) { transform: scale(0.96); }
  .btn-answer:disabled { opacity: 0.45; cursor: default; transform: none !important; }

  .btn-answer .icon { font-size: 2rem; }
  .btn-answer .sub  {
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.65;
  }

  .btn-essex {
    background: linear-gradient(145deg, #FFF5CC, #FDEDB0);
    border-color: var(--essex);
    color: var(--essex-dark);
  }
  .btn-essex:hover:not(:disabled) {
    background: linear-gradient(145deg, var(--essex), var(--essex-pink));
    color: #fff;
    border-color: transparent;
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(201,150,12,0.35);
  }

  .btn-barry {
    background: linear-gradient(145deg, #D6EAF8, #AED6F1);
    border-color: var(--barry);
    color: var(--barry);
  }
  .btn-barry:hover:not(:disabled) {
    background: linear-gradient(145deg, var(--barry), var(--barry-mid));
    color: #fff;
    border-color: transparent;
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(26,79,114,0.35);
  }

  /* ─── NEXT BUTTON ─────────────── */
  .btn-next {
    display: block;
    margin: 0 auto;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 44px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
  }
  .btn-next.show {
    opacity: 1;
    pointer-events: all;
  }
  .btn-next:hover { background: #444; transform: translateY(-1px); }

  /* ─── END SCREEN ──────────────── */
  #end-screen {
    display: none;
    width: 100%;
    max-width: 580px;
    text-align: center;
    animation: fadeUp 0.55s ease;
  }
  #end-screen.show { display: block; }

  .end-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px 36px;
    box-shadow: 0 8px 36px var(--shadow);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .end-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(to right, var(--essex-pink), var(--barry));
  }

  .end-stars { font-size: 2rem; margin-bottom: 12px; letter-spacing: 2px; }

  .end-big-score {
    font-family: 'Abril Fatface', serif;
    font-size: 5.5rem;
    color: var(--text);
    line-height: 1;
  }
  .end-big-score .denom {
    font-family: 'Lato', sans-serif;
    font-size: 1.4rem;
    color: var(--muted);
    font-weight: 400;
  }

  .end-verdict {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin: 14px 0 20px;
    line-height: 1.5;
  }

  .nessa-box {
    background: linear-gradient(135deg, #1A2030, #1A4F72);
    border-radius: 14px;
    padding: 24px 24px 20px;
    text-align: left;
    position: relative;
  }
  .nessa-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    font-weight: 700;
    color: #7FB3C8;
    margin-bottom: 10px;
  }
  .nessa-text {
    font-style: italic;
    color: #D0E8F2;
    line-height: 1.8;
    font-size: 0.97rem;
  }
  .nessa-sig {
    margin-top: 12px;
    font-size: 0.75rem;
    color: #5A90A8;
    font-style: normal;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .btn-restart {
    background: linear-gradient(135deg, var(--essex-pink), var(--barry));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 18px 56px;
    font-family: 'Abril Fatface', serif;
    font-size: 1.25rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.22);
    width: 100%;
  }
  .btn-restart:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.28);
  }
</style>
</head>
<body>

<header>
  <div class="header-flags">
    <span class="flag">🌹</span>
    <h1>ESSEX <span class="or">or</span> BARRY?</h1>
    <span class="flag">🐉</span>
  </div>
  <p class="subtitle">The ultimate Gavin &amp; Stacey knowledge test</p>
  <div class="divider"></div>
</header>

<div id="game-area">
  <div class="meta-row">
    <span id="q-counter">Question 1 of 20</span>
    <span class="score-badge" id="score-label">Score: 0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="card-wrap">
    <div class="card" id="card">
      <div class="q-label" id="q-label"></div>
      <div class="q-body" id="q-body"></div>
      <div class="q-hint" id="q-hint"></div>
    </div>
  </div>

  <div class="feedback-bar" id="feedback"></div>

  <div class="answer-buttons">
    <button class="btn-answer btn-essex" id="btn-essex" onclick="answer('essex')">
      <span class="icon">🌹</span>
      Essex
      <span class="sub">Billericay</span>
    </button>
    <button class="btn-answer btn-barry" id="btn-barry" onclick="answer('barry')">
      <span class="icon">🐉</span>
      Barry
      <span class="sub">Wales</span>
    </button>
  </div>

  <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next Question →</button>
</div>

<div id="end-screen">
  <div class="end-card">
    <div class="end-stars" id="end-stars">⭐⭐⭐</div>
    <div class="end-big-score" id="end-score">0 <span class="denom">/ 20</span></div>
    <div class="end-verdict" id="end-verdict"></div>
    <div class="nessa-box">
      <div class="nessa-label">Nessa says…</div>
      <div class="nessa-text" id="nessa-text"></div>
      <div class="nessa-sig">— Vanessa Jenkins</div>
    </div>
  </div>
  <button class="btn-restart" onclick="restart()">🔄 Play Again</button>
</div>

<script>
const questions = [
  // ── QUOTES ──────────────────────────────────────────────────────────────
  {
    type: 'quote',
    text: "I once did a season as a croupier in Macau. Reasons I won't go into.",
    hint: "One of her many, many career anecdotes",
    answer: 'barry'
  },
  {
    type: 'quote',
    text: "Right, who wants bread? I've got white, brown, or I can do you a pitta.",
    hint: "Said by the family member who takes hosting extremely seriously",
    answer: 'barry'
  },
  {
    type: 'quote',
    text: "I'm not gonna lie — that's the nicest thing anyone's ever said to me. And I once got a compliment from José Mourinho.",
    hint: "Said by the biggest football fan in the show",
    answer: 'essex'
  },
  {
    type: 'quote',
    text: "There's a secret I've been keeping. About the fishing trip. I've never told a soul.",
    hint: "A confession that haunted him for years",
    answer: 'barry'
  },
  {
    type: 'quote',
    text: "I don't want a fuss. I just want a prawn cocktail and some nice music.",
    hint: "A woman who has very clear ideas about a good evening out",
    answer: 'essex'
  },
  {
    type: 'quote',
    text: "I've worked with Tom Jones. Not directly. But I was in the same building.",
    hint: "She counts this as a legitimate professional connection",
    answer: 'barry'
  },
  {
    type: 'quote',
    text: "He's a good lad, Gavin. He just gets himself in a muddle.",
    hint: "Said by the most quietly wise parent in the show",
    answer: 'essex'
  },
  {
    type: 'quote',
    text: "I'm saying nothing. I don't need to say nothing. My face says it all.",
    hint: "Said by a woman who absolutely has to say something",
    answer: 'essex'
  },
  {
    type: 'quote',
    text: "You can borrow my van if you want. I've cleared most of the stuff out the back.",
    hint: "An offer from the most generous, uncomplicated man in the show",
    answer: 'barry'
  },
  {
    type: 'quote',
    text: "I've been engaged. Twice. Once in Tenerife and once under circumstances I can't really go into.",
    hint: "Her romantic history is as extensive as her CV",
    answer: 'barry'
  },

  // ── FACTS ────────────────────────────────────────────────────────────────
  {
    type: 'fact',
    text: "Smithy's actual job — the one he does for money",
    hint: "It's a trade, not an office job",
    answer: 'essex'
  },
  {
    type: 'fact',
    text: "Nessa's place of work at the start of the series",
    hint: "It sells cigarettes, scratch cards and fizzy drinks",
    answer: 'barry'
  },
  {
    type: 'fact',
    text: "Mick Shipman's profession throughout the series",
    hint: "He sells something with four wheels",
    answer: 'essex'
  },
  {
    type: 'fact',
    text: "Jason's best mate — who barely speaks even by Jason's standards",
    hint: "Named after a small bird",
    answer: 'barry'
  },
  {
    type: 'fact',
    text: "Baby Neil's mother",
    hint: "The identity of the father, however, remains officially unconfirmed",
    answer: 'barry'
  },
  {
    type: 'fact',
    text: "The legendary fishing trip that Bryn and Jason took — it departed from here",
    hint: "It's the trip neither of them will fully explain",
    answer: 'barry'
  },
  {
    type: 'fact',
    text: "Where Gavin works when he and Stacey first meet",
    hint: "It's a large office — financial services sector",
    answer: 'essex'
  },
  {
    type: 'fact',
    text: "Doris — the older woman in the pub who always has something to say — lives here",
    hint: "She's a fixture at the local watering hole",
    answer: 'barry'
  },
  {
    type: 'fact',
    text: "The character whose surname is 'Coaches' — not as a nickname, just what everyone calls him",
    hint: "He runs a Sunday league team",
    answer: 'essex'
  },
  {
    type: 'fact',
    text: "Stacey's dad — who left when she was young — was originally from here",
    hint: "His absence is a recurring theme for the family",
    answer: 'barry'
  },
];

let shuffled = [], current = 0, score = 0, answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadQuestion() {
  const q = shuffled[current];
  answered = false;

  // Reset card
  const card = document.getElementById('card');
  card.className = 'card';

  // Label
  document.getElementById('q-label').textContent =
    q.type === 'quote' ? '💬 Quote — who said this, and where are they from?' : '📍 Fact — which place does this refer to?';

  // Body
  const body = document.getElementById('q-body');
  body.textContent = q.text;
  body.className = q.type === 'quote' ? 'q-body is-quote' : 'q-body';

  // Hint
  document.getElementById('q-hint').textContent = q.hint;

  // Meta
  document.getElementById('q-counter').textContent = `Question ${current + 1} of ${shuffled.length}`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(current / shuffled.length) * 100}%`;

  // Reset feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback-bar';
  fb.textContent = '';

  // Re-enable buttons
  document.getElementById('btn-essex').disabled = false;
  document.getElementById('btn-barry').disabled = false;
  document.getElementById('btn-next').className = 'btn-next';
}

function answer(choice) {
  if (answered) return;
  answered = true;

  const q = shuffled[current];
  const correct = choice === q.answer;
  if (correct) score++;

  const card = document.getElementById('card');
  const fb = document.getElementById('feedback');

  if (correct) {
    card.classList.add('correct');
    fb.className = 'feedback-bar show correct';
    fb.textContent = q.answer === 'essex' ? '✓ Correct — pure Essex! 🌹' : '✓ Correct — proper Barry! 🐉';
  } else {
    card.classList.add('wrong', 'shake');
    fb.className = 'feedback-bar show wrong';
    fb.textContent = q.answer === 'essex' ? '✗ It was Essex 🌹 — close though!' : '✗ It was Barry 🐉 — nearly!';
  }

  document.getElementById('btn-essex').disabled = true;
  document.getElementById('btn-barry').disabled = true;
  document.getElementById('btn-next').className = 'btn-next show';
  document.getElementById('score-label').textContent = `Score: ${score}`;
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) showEnd();
  else loadQuestion();
}

const nessaLines = [
  // 0–3 (poor)
  "Right. I don't want to be unkind — I've been kind to people on six continents and it's never done me any good. But this score? I've seen better performances at a pub quiz in Rhyl. And I organised that pub quiz. Play again. Go on.",
  // 4–7
  "I'm not easily disappointed — I've been disappointed by a prime minister and two professional footballers and I barely blinked. But I have to say, you could do better. I've known people in Vladivostok with better general knowledge. Still, the effort was there. I'll give you that.",
  // 8–11
  "Average. That's what I'd call it. And I've met average people all around the world — in Antwerp, in Cape Verde, in the back of a transit van outside Swindon. You're better than most of them. Just a bit more work needed, love.",
  // 12–15
  "Not bad. Not bad at all. I once worked alongside a woman in Barbados who knew everything about everything. You're not quite her — but you're getting there. I'd have you on my pub quiz team. Conditionally.",
  // 16–19
  "I'm impressed. And I don't impress easy — I've been to the edges of this world and back, I've had conversations with royalty, and I once beat Gary Barlow at Trivial Pursuit. You, my love, know your stuff.",
  // 20 (perfect)
  "Right. I've done things in my time. Things that would make your hair stand on end. I've lived, Stacey — I've really lived. But what you've just done there? That is extraordinary. Full marks. I'd be proud to call you one of our own. And I don't say that to just anyone. What's occurring with you and Mastermind?"
];

function showEnd() {
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('end-screen').classList.add('show');

  const total = shuffled.length;
  document.getElementById('end-score').innerHTML = `${score} <span class="denom">/ ${total}</span>`;

  const pct = score / total;
  let stars, verdict, nessaIdx;

  if (pct === 1)       { stars = '⭐⭐⭐⭐⭐'; verdict = "Perfect score. You know this show better than Smithy knows a buffet.";                       nessaIdx = 5; }
  else if (pct >= 0.8) { stars = '⭐⭐⭐⭐';  verdict = "Brilliant result. You're basically an honorary member of both families.";                    nessaIdx = 4; }
  else if (pct >= 0.6) { stars = '⭐⭐⭐';   verdict = "Solid effort. Smithy would give you a firm thumbs up.";                                        nessaIdx = 3; }
  else if (pct >= 0.4) { stars = '⭐⭐';    verdict = "Getting there. Like Bryn trying to drive to Essex — you'll arrive eventually.";               nessaIdx = 2; }
  else if (pct >= 0.2) { stars = '⭐';     verdict = "Oh, what a to-do. Even Dave Coaches could beat this score.";                                   nessaIdx = 1; }
  else                  { stars = '💔';     verdict = "Blimey. Did you actually watch the show?";                                                      nessaIdx = 0; }

  document.getElementById('end-stars').textContent = stars;
  document.getElementById('end-verdict').textContent = verdict;
  document.getElementById('nessa-text').textContent = nessaLines[nessaIdx];
}

function restart() {
  score = 0; current = 0;
  shuffled = shuffle(questions);
  document.getElementById('end-screen').className = '';
  document.getElementById('game-area').style.display = '';
  loadQuestion();
}

// ── INIT ──
shuffled = shuffle(questions);
loadQuestion();
</script>
</body>
</html>

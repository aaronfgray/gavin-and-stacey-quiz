<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gavin &amp; Stacey Quiz — Essex or Barry?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --essex: #C9960C;
    --essex-dark: #7A5800;
    --essex-pink: #D94F6A;
    --barry: #1A4F72;
    --barry-mid: #2980B9;
    --bg: #FAF5E8;
    --card-bg: #FFFEF9;
    --text: #22150A;
    --border: #E2C97E;
    --muted: #9A8A70;
    --shadow: rgba(0,0,0,0.11);
    --correct: #1E8449;
    --correct-bg: #F2FFF6;
    --correct-border: #27AE60;
    --wrong: #C0392B;
    --wrong-bg: #FFF5F5;
    --wrong-border: #E74C3C;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 48px;
    background-image:
      radial-gradient(ellipse at 8% 65%, rgba(201,150,12,0.11) 0%, transparent 52%),
      radial-gradient(ellipse at 92% 35%, rgba(26,79,114,0.11) 0%, transparent 52%);
  }

  /* ─── HEADER ─────────────────── */
  header {
    text-align: center;
    margin-bottom: 26px;
    padding-top: 14px;
  }
  .header-flags { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 4px; }
  .flag { font-size: 2rem; }
  h1 {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    color: var(--text);
    letter-spacing: 3px;
    line-height: 1;
  }
  h1 .or { font-size: 0.52em; color: var(--muted); letter-spacing: 1px; vertical-align: middle; }
  .subtitle { font-style: italic; color: var(--muted); font-size: 0.88rem; margin-top: 5px; }
  .divider { width: 72px; height: 3px; background: linear-gradient(to right, var(--essex-pink), var(--barry)); border-radius: 2px; margin: 12px auto 0; }

  /* ─── GAME WRAPPER ────────────── */
  #game-area { width: 100%; max-width: 620px; animation: fadeUp 0.45s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── META ROW ────────────────── */
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 9px;
    font-size: 0.76rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
  }
  .score-badge {
    background: var(--text);
    color: #fff;
    border-radius: 20px;
    padding: 4px 13px;
    font-size: 0.76rem;
  }

  /* ─── PROGRESS ────────────────── */
  .progress-track { width: 100%; height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(to right, var(--essex-pink), var(--barry)); border-radius: 3px; transition: width 0.45s cubic-bezier(.4,0,.2,1); }

  /* ─── QUESTION CARD ───────────── */
  .q-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 32px 30px 28px;
    box-shadow: 0 5px 24px var(--shadow);
    margin-bottom: 14px;
    position: relative;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    border-radius: 18px 18px 0 0;
    background: linear-gradient(to right, var(--essex-pink), var(--barry));
  }

  .q-label {
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    font-weight: 700;
    color: #C0A870;
    margin-bottom: 14px;
  }

  .q-number {
    display: inline-block;
    background: var(--border);
    color: var(--essex-dark);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 10px;
    padding: 2px 10px;
    margin-bottom: 14px;
    margin-right: 6px;
  }

  .q-body {
    font-size: clamp(1.05rem, 2.5vw, 1.3rem);
    color: var(--text);
    line-height: 1.65;
    font-weight: 700;
  }
  .q-body.is-quote {
    font-weight: 400;
    font-style: italic;
    font-size: clamp(1.1rem, 2.7vw, 1.38rem);
  }
  .q-body.is-quote::before { content: '\201C'; }
  .q-body.is-quote::after  { content: '\201D'; }

  .q-attribution {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
  }

  /* ─── OPTIONS ─────────────────── */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  @media (max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
  }

  .opt-btn {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: all 0.18s cubic-bezier(.4,0,.2,1);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    position: relative;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--essex);
    background: var(--essex-light, #FFF8DC);
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(201,150,12,0.2);
  }
  .opt-btn:active:not(:disabled) { transform: scale(0.98); }
  .opt-btn:disabled { cursor: default; }

  .opt-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--border);
    color: var(--essex-dark);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.18s, color 0.18s;
  }

  .opt-btn.correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
    color: var(--correct);
  }
  .opt-btn.correct .opt-letter { background: var(--correct); color: #fff; }

  .opt-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
    color: var(--wrong);
  }
  .opt-btn.wrong .opt-letter { background: var(--wrong); color: #fff; }

  .opt-btn.reveal {
    background: var(--correct-bg);
    border-color: var(--correct-border);
    color: var(--correct);
    opacity: 0.7;
  }
  .opt-btn.reveal .opt-letter { background: var(--correct); color: #fff; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-8px); }
    40%     { transform: translateX(8px); }
    60%     { transform: translateX(-5px); }
    80%     { transform: translateX(3px); }
  }
  .opt-btn.shake { animation: shake 0.35s ease; }

  /* ─── FEEDBACK ────────────────── */
  .feedback-row {
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin-bottom: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .feedback-row.show { opacity: 1; }
  .feedback-row.correct { color: var(--correct); }
  .feedback-row.wrong   { color: var(--wrong); }

  /* ─── EXPLANATION ─────────────── */
  .explanation {
    background: #F5F0E8;
    border-left: 3px solid var(--essex);
    border-radius: 0 8px 8px 0;
    padding: 11px 14px;
    font-size: 0.83rem;
    color: #55400A;
    line-height: 1.6;
    margin-bottom: 12px;
    display: none;
  }
  .explanation.show { display: block; }

  /* ─── NEXT BUTTON ─────────────── */
  .btn-next {
    display: block;
    margin: 0 auto;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 44px;
    font-family: 'Lato', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: all 0.22s;
  }
  .btn-next.show { opacity: 1; pointer-events: all; }
  .btn-next:hover { background: #444; transform: translateY(-1px); }

  /* ─── END SCREEN ──────────────── */
  #end-screen {
    display: none;
    width: 100%;
    max-width: 620px;
    animation: fadeUp 0.5s ease;
  }
  #end-screen.show { display: block; }

  .end-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 38px 30px 34px;
    box-shadow: 0 8px 36px var(--shadow);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .end-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(to right, var(--essex-pink), var(--barry));
  }

  .end-stars { font-size: 1.9rem; margin-bottom: 10px; letter-spacing: 3px; }
  .end-big {
    font-family: 'Abril Fatface', serif;
    font-size: 5rem;
    color: var(--text);
    line-height: 1;
  }
  .end-big .denom { font-family: 'Lato', sans-serif; font-size: 1.3rem; color: var(--muted); font-weight: 400; }
  .end-verdict { font-size: 1.05rem; font-weight: 700; color: var(--text); margin: 12px 0 20px; line-height: 1.5; }

  .nessa-box {
    background: linear-gradient(135deg, #131C2C, #1A4F72);
    border-radius: 14px;
    padding: 22px 22px 18px;
    text-align: left;
  }
  .nessa-label { font-size: 0.63rem; text-transform: uppercase; letter-spacing: 2.5px; font-weight: 700; color: #7FB3C8; margin-bottom: 9px; }
  .nessa-text  { font-style: italic; color: #CEE8F5; line-height: 1.8; font-size: 0.94rem; }
  .nessa-sig   { margin-top: 11px; font-size: 0.73rem; color: #5A90A8; font-style: normal; font-weight: 700; letter-spacing: 1px; }

  .btn-restart {
    background: linear-gradient(135deg, var(--essex-pink), var(--barry));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 18px 0;
    font-family: 'Abril Fatface', serif;
    font-size: 1.2rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 5px 18px rgba(0,0,0,0.2);
    width: 100%;
  }
  .btn-restart:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(0,0,0,0.26); }

  /* ─── SCORE BREAKDOWN ─────────── */
  .breakdown {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 10px 0 18px;
  }
  .pip {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
  }
  .pip.c { background: var(--correct); color: #fff; }
  .pip.w { background: var(--wrong);   color: #fff; }
</style>
</head>
<body>

<header>
  <div class="header-flags">
    <span class="flag">🌹</span>
    <h1>ESSEX <span class="or">or</span> BARRY?</h1>
    <span class="flag">🐉</span>
  </div>
  <p class="subtitle">Gavin &amp; Stacey — serious trivia for serious fans</p>
  <div class="divider"></div>
</header>

<div id="game-area">
  <div class="meta-row">
    <span id="q-counter">Question 1 of 15</span>
    <span class="score-badge" id="score-label">Score: 0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="q-card" id="q-card">
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px;">
      <span class="q-number" id="q-number">Q1</span>
      <span class="q-label" id="q-label">Trivia</span>
    </div>
    <div class="q-body" id="q-body"></div>
    <div class="q-attribution" id="q-attribution"></div>
  </div>

  <div class="options-grid" id="options-grid"></div>

  <div class="feedback-row" id="feedback"></div>
  <div class="explanation" id="explanation"></div>

  <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next Question →</button>
</div>

<div id="end-screen">
  <div class="end-card">
    <div class="end-stars" id="end-stars"></div>
    <div class="end-big" id="end-big">0 <span class="denom">/ 15</span></div>
    <div class="breakdown" id="breakdown"></div>
    <div class="end-verdict" id="end-verdict"></div>
    <div class="nessa-box">
      <div class="nessa-label">Nessa says…</div>
      <div class="nessa-text" id="nessa-text"></div>
      <div class="nessa-sig">— Vanessa Jenkins</div>
    </div>
  </div>
  <button class="btn-restart" onclick="restart()">🔄 Play Again</button>
</div>

<script>
const LETTERS = ['A','B','C','D'];

const questions = [
  {
    type: 'trivia',
    text: "What is Smithy's real first name?",
    options: ["Gary", "Neil", "Kevin", "Wayne"],
    answer: 1,
    explanation: "He's Neil Smith — though almost no one calls him anything but Smithy."
  },
  {
    type: 'trivia',
    text: "What is Smithy's actual trade — what does he do for work?",
    options: ["Electrician", "Plumber", "Plasterer", "Bricklayer"],
    answer: 2,
    explanation: "Smithy is a plasterer. It comes up a few times, though his job seems to take up very little of his schedule."
  },
  {
    type: 'trivia',
    text: "What is the nickname of Jason's best mate — the man of very few words?",
    options: ["Sparrow", "Birdseye", "Budgie", "Finch"],
    answer: 2,
    explanation: "Budgie is Jason's best friend and near-constant companion. Between the two of them they probably speak about forty words per episode."
  },
  {
    type: 'trivia',
    text: "What is Nessa's job when we first meet her at the start of the series?",
    options: ["Barmaid at the local pub", "Dinner lady at the school", "Dispatcher at a taxi firm", "Worker at the local newsagent"],
    answer: 3,
    explanation: "Nessa works at the local newsagent in Barry — a fairly modest position for a woman who claims to have worked as a croupier in Macau and a roadie for Bonnie Tyler."
  },
  {
    type: 'trivia',
    text: "What is Mick Shipman's profession throughout the series?",
    options: ["Insurance broker", "Estate agent", "Used car salesman", "Driving instructor"],
    answer: 2,
    explanation: "Mick works as a used car salesman — easy-going and unflappable, exactly as you'd imagine."
  },
  {
    type: 'quote',
    text: "It's not lying, it's just... not telling the full truth. There's a difference.",
    attribution: "Who said this — and where are they from?",
    options: ["Smithy (Essex)", "Bryn (Barry)", "Dave (Essex)", "Jason (Barry)"],
    answer: 1,
    explanation: "That's Bryn — doing what Bryn does best: finding creative philosophical distinctions that conveniently absolve him of honesty about the fishing trip."
  },
  {
    type: 'trivia',
    text: "Who is the mother of baby Neil?",
    options: ["Dawn", "Stacey", "Gwen", "Nessa"],
    answer: 3,
    explanation: "Nessa is Neil's mum. The identity of the father, of course, remains officially unconfirmed — though Smithy has some strong feelings on the matter."
  },
  {
    type: 'trivia',
    text: "How many full series of Gavin & Stacey were made before the 2019 Christmas special?",
    options: ["2", "3", "4", "5"],
    answer: 1,
    explanation: "Three series: 2007, 2008, and 2009 — plus a 2008 Christmas special. Then a decade of silence before the 2019 Christmas special."
  },
  {
    type: 'trivia',
    text: "Who co-wrote Gavin & Stacey alongside Ruth Jones?",
    options: ["Rob Brydon", "Ricky Gervais", "James Corden", "Steve Coogan"],
    answer: 2,
    explanation: "Ruth Jones and James Corden wrote the show together. Jones also plays Nessa; Corden plays Smithy. It was their first major writing collaboration."
  },
  {
    type: 'trivia',
    text: "Why is Dave known as 'Dave Coaches' — what exactly does he coach?",
    options: ["He coaches swimming", "He coaches a football team", "He drives a coach for a living", "He coaches darts at the local pub"],
    answer: 1,
    explanation: "Dave coaches a local Sunday league football team — hence Dave Coaches. Not the most distinguished nickname but it stuck."
  },
  {
    type: 'quote',
    text: "I'm not asking for much. I just want everything to be perfect.",
    attribution: "Which character is this — and where are they from?",
    options: ["Gwen (Barry)", "Nessa (Barry)", "Pam (Essex)", "Dawn (Essex)"],
    answer: 2,
    explanation: "Classic Pam Shipman. She asks for very little, as long as that very little is completely flawless in every conceivable way."
  },
  {
    type: 'trivia',
    text: "Before they meet in person, how do Gavin and Stacey first get to know each other?",
    options: ["On a dating website", "Through long phone calls at work", "Via texts exchanged through Smithy and Stacey's mate", "At a mutual friend's party in Cardiff"],
    answer: 1,
    explanation: "They worked at the same insurance call centre company and began talking on the phone — calls that became longer and more frequent until they decided to meet."
  },
  {
    type: 'trivia',
    text: "What is Bryn's relationship to Stacey?",
    options: ["Her maternal grandfather", "Her father's brother", "Her mother's brother", "Her godfather"],
    answer: 2,
    explanation: "Bryn is Gwen's brother, making him Stacey's uncle. He essentially helped raise her after her dad left."
  },
  {
    type: 'quote',
    text: "I've had a good life. A full life. There are things I haven't done, but there are things I have done that most people only dream about.",
    attribution: "Which character delivered this line?",
    options: ["Smithy", "Nessa", "Bryn", "Pam"],
    answer: 1,
    explanation: "Nessa, naturally. The woman has worked on a cruise ship, arm-wrestled in Singapore and apparently once shared a lift with Diana Ross."
  },
  {
    type: 'trivia',
    text: "What song is most closely associated with Smithy and Nessa throughout the series?",
    options: ["Don't Go Breaking My Heart", "Up Where We Belong", "Islands in the Stream", "I Got You Babe"],
    answer: 2,
    explanation: "Islands in the Stream — originally by Kenny Rogers and Dolly Parton — becomes their song after a memorable karaoke performance. It haunts them both beautifully."
  },
];

// ── STATE ──────────────────────────────────────────────────
let shuffled = [], current = 0, score = 0, answered = false;
let results = []; // true/false per question

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── LOAD QUESTION ──────────────────────────────────────────
function loadQuestion() {
  const q = shuffled[current];
  answered = false;
  const total = shuffled.length;

  // meta
  document.getElementById('q-counter').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;
  document.getElementById('q-number').textContent = `Q${current + 1}`;
  document.getElementById('q-label').textContent = q.type === 'quote' ? '💬 Quote' : '📋 Trivia';

  // question text
  const body = document.getElementById('q-body');
  body.textContent = q.text;
  body.className = q.type === 'quote' ? 'q-body is-quote' : 'q-body';

  const attr = document.getElementById('q-attribution');
  attr.textContent = q.attribution || '';

  // options
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.onclick = () => pickAnswer(i);
    grid.appendChild(btn);
  });

  // reset feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback-row';
  fb.textContent = '';

  const ex = document.getElementById('explanation');
  ex.className = 'explanation';
  ex.textContent = '';

  document.getElementById('btn-next').className = 'btn-next';
}

// ── PICK ANSWER ────────────────────────────────────────────
function pickAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = shuffled[current];
  const correct = idx === q.answer;
  if (correct) score++;
  results.push(correct);

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  if (correct) {
    btns[idx].classList.add('correct');
  } else {
    btns[idx].classList.add('wrong', 'shake');
    btns[q.answer].classList.add('reveal');
  }

  const fb = document.getElementById('feedback');
  fb.className = correct ? 'feedback-row show correct' : 'feedback-row show wrong';
  fb.textContent = correct ? '✓ Correct!' : `✗ Not quite — the answer was ${LETTERS[q.answer]}`;

  const ex = document.getElementById('explanation');
  ex.textContent = q.explanation;
  ex.className = 'explanation show';

  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('btn-next').className = 'btn-next show';
}

// ── NEXT ───────────────────────────────────────────────────
function nextQuestion() {
  current++;
  if (current >= shuffled.length) showEnd();
  else loadQuestion();
}

// ── END SCREEN ─────────────────────────────────────────────
const nessaLines = [
  "Right. I don't want to be unkind — I've been kind to people on six continents and it has never once worked in my favour. But this score? I've seen better general knowledge from a man I met in a service station outside Exeter. And he didn't speak English.",
  "I'm not easily disappointed. I've been disappointed by presidents, by professional athletes, and once by a man in Lisbon who told me he could cook. But you? You need to watch the show again. From the beginning. Possibly twice.",
  "Average. That's what I'd call it. And I've met average people all over the world — in Antwerp, in Brisbane, in the back of a transit van on the M4. You're better than most of them. But not by much, if I'm honest.",
  "That's more like it. Not outstanding, mind you — I once knew a man in Reykjavik who scored higher and he'd only seen twenty minutes of the show by accident. But it's a solid effort. I've seen worse.",
  "Now we're talking. I'm not easily impressed — I've met impressive people across four decades and two hemispheres and they've all let me down eventually. But you? You know your stuff. I'd have you on my pub quiz team. Provisionally.",
  "Perfect. And I don't say that lightly. I once used that word to describe a sunset in Fiji and a bowl of cawl in 1987 and those are the only other times it's applied. What's occurring with you and Mastermind?"
];

function showEnd() {
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('end-screen').classList.add('show');

  const total = shuffled.length;
  document.getElementById('end-big').innerHTML = `${score} <span class="denom">/ ${total}</span>`;

  // breakdown pips
  const bd = document.getElementById('breakdown');
  bd.innerHTML = results.map(r => `<span class="pip ${r ? 'c' : 'w'}">${r ? '✓' : '✗'}</span>`).join('');

  const pct = score / total;
  let stars, verdict, nessaIdx;

  if (pct === 1)        { stars = '⭐⭐⭐⭐⭐'; verdict = "Perfect. You absolute encyclopaedia.";                                          nessaIdx = 5; }
  else if (pct >= 0.85) { stars = '⭐⭐⭐⭐½'; verdict = "Nearly perfect. You clearly rewatched it recently.";                           nessaIdx = 4; }
  else if (pct >= 0.7)  { stars = '⭐⭐⭐⭐';  verdict = "Very solid. A genuine Gavin & Stacey enthusiast.";                             nessaIdx = 4; }
  else if (pct >= 0.55) { stars = '⭐⭐⭐';   verdict = "Decent. You know the big stuff but missed some details.";                       nessaIdx = 3; }
  else if (pct >= 0.4)  { stars = '⭐⭐';    verdict = "Room for improvement. Maybe a rewatch is in order?";                            nessaIdx = 2; }
  else if (pct >= 0.25) { stars = '⭐';     verdict = "Oh, what a to-do. Even Dave Coaches knows more than this.";                     nessaIdx = 1; }
  else                   { stars = '💔';     verdict = "Did you actually watch the show, or just the memes?";                           nessaIdx = 0; }

  document.getElementById('end-stars').textContent = stars;
  document.getElementById('end-verdict').textContent = verdict;
  document.getElementById('nessa-text').textContent = nessaLines[nessaIdx];
}

// ── RESTART ────────────────────────────────────────────────
function restart() {
  score = 0; current = 0; results = [];
  shuffled = shuffle(questions);
  document.getElementById('end-screen').className = '';
  document.getElementById('game-area').style.display = '';
  loadQuestion();
}

// ── INIT ───────────────────────────────────────────────────
shuffled = shuffle(questions);
loadQuestion();
</script>
